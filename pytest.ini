; ═══════════════════════════════════════════════════════════════
; pytest.ini — pytest Configuration
; ═══════════════════════════════════════════════════════════════
;
; This file tells pytest how to run your tests.
; pytest automatically finds this file when you run `pytest`.
; ═══════════════════════════════════════════════════════════════

[pytest]

DJANGO_SETTINGS_MODULE = core.settings.development
python_files = tests.py test_*.py *_tests.py
python_classes = Test* 
python_functions = test_*

addopts = --reuse-db --cov=apps --cov-report=html --cov-report=term-missing
